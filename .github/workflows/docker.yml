name: docker

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TRIVY_IMAGE: ghcr.io/aquasecurity/trivy:0.69.3

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: web/Dockerfile
          load: true
          push: false
          tags: site-web:ci
      - name: Prepare Trivy cache
        run: mkdir -p .cache/trivy
      - name: Scan image
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}/.cache/trivy:/root/.cache/" \
            "${TRIVY_IMAGE}" \
            image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            site-web:ci
