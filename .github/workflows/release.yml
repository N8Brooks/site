name: release

on:
  workflow_run:
    workflows:
      - ci
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  packages: write

concurrency:
  group: release-main
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TRIVY_IMAGE: ghcr.io/aquasecurity/trivy:0.69.3

jobs:
  prepare:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      owner: ${{ steps.owner.outputs.value }}
      release_ref: ${{ steps.release.outputs.ref }}
      should_release: ${{ steps.release.outputs.should_release }}
    steps:
      - id: owner
        name: Normalize registry owner
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
      - id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WORKFLOW_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$WORKFLOW_CONCLUSION" != "success" ]]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          current_main="$(git rev-parse HEAD)"
          if [[ "$current_main" != "$WORKFLOW_HEAD_SHA" ]]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ref=$WORKFLOW_HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "should_release=true" >> "$GITHUB_OUTPUT"

  publish:
    if: needs.prepare.outputs.should_release == 'true'
    needs: prepare
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ needs.prepare.outputs.owner }}/site-web
          tags: |
            type=raw,value=main
            type=sha,prefix=sha-
      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: web/Dockerfile
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
      - name: Prepare Trivy cache
        run: mkdir -p .cache/trivy
      - name: Scan pushed image
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker run --rm \
            -e TRIVY_USERNAME \
            -e TRIVY_PASSWORD \
            -v "${{ github.workspace }}/.cache/trivy:/root/.cache/" \
            "${TRIVY_IMAGE}" \
            image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            ghcr.io/${{ needs.prepare.outputs.owner }}/site-web@${{ steps.build.outputs.digest }}
